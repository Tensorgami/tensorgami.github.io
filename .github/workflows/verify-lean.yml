name: Verify Lean formalizations

on:
  push:
    paths:
      - ".github/workflows/verify-lean.yml"
      - "formalizations/**/*.lean"
      - "formalizations/**/lakefile.toml"
      - "formalizations/**/lake-manifest.json"
      - "formalizations/**/lean-toolchain"
  pull_request:
    paths:
      - ".github/workflows/verify-lean.yml"
      - "formalizations/**/*.lean"
      - "formalizations/**/lakefile.toml"
      - "formalizations/**/lake-manifest.json"
      - "formalizations/**/lean-toolchain"
  workflow_dispatch:

jobs:
  disjoint-decomposition:
    name: Disjoint decomposition note
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Fetch mathlib cache
        working-directory: formalizations/disjoint-decomposition
        run: lake exe cache get DisjointDecomposition.lean

      - name: Build Lean formalization
        working-directory: formalizations/disjoint-decomposition
        run: lake build

  extracting-first-prime:
